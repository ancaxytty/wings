    <g stroke="#5DAE3A" stroke-width="4" stroke-linecap="round">
      <line x1="26" y1="-2" x2="26" y2="6"/><line x1="26" y1="46" x2="26" y2="54"/>
      <line x1="-2" y1="26" x2="6" y2="26"/><line x1="46" y1="26" x2="54" y2="26"/>
    </g>
  </g>
  <!-- educator (woman) -->
