<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Estudiante de Atencion a la Primera Infancia">
  <defs>
    <linearGradient id="in-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf6fc"/><stop offset="1" stop-color="#e6f7ea"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#in-bg)"/>
  <rect y="240" width="400" height="60" fill="#d4ecdc"/>
  <!-- sun -->
  <g transform="translate(322,44)">
