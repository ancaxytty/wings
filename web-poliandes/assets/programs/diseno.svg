<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Diseno y Artes Graficas">
  <defs>
    <linearGradient id="ds-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0fc"/><stop offset="1" stop-color="#eaf6fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#ds-bg)"/>
  <!-- artboard -->
  <g transform="translate(70,52)">
    <rect width="150" height="160" rx="12" fill="#fff" stroke="#d6dcef" stroke-width="2"/>
    <circle cx="48" cy="48" r="22" fill="#5BC8E8"/>
    <rect x="80" y="30" width="48" height="36" rx="6" fill="#9BD45A"/>
    <polygon points="40,130 70,80 100,130" fill="#2E9BD6"/>
    <polygon points="80,130 104,92 128,130" fill="#5DAE3A"/>
    <rect x="22" y="138" width="106" height="8" rx="4" fill="#e4edf3"/>
  </g>
  <!-- color palette -->
  <g transform="translate(244,70)">
    <path d="M40 0 a56 56 0 1 0 12 111 c10 -1 8 -14 0 -20 c-8 -6 -2 -16 8 -16 h14 a40 40 0 0 0 6 -79 A56 56 0 0 0 40 0 Z" fill="#fff" stroke="#d6dcef" stroke-width="2"/>
    <circle cx="30" cy="30" r="9" fill="#2E9BD6"/>
    <circle cx="62" cy="26" r="9" fill="#5DAE3A"/>
    <circle cx="80" cy="56" r="9" fill="#9BD45A"/>
    <circle cx="28" cy="66" r="9" fill="#5BC8E8"/>
  </g>
  <!-- pencil -->
  <g transform="translate(250,150) rotate(35)">
    <rect width="14" height="80" rx="3" fill="#5DAE3A"/>
    <polygon points="0,80 14,80 7,98" fill="#1d2733"/>
