<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Asistente Contable">
  <defs>
    <linearGradient id="ct-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf6fc"/><stop offset="1" stop-color="#dff0f8"/>
    </linearGradient>
    <linearGradient id="ct-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BC8E8"/><stop offset="1" stop-color="#2E9BD6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#ct-bg)"/>
  <!-- chart bars -->
  <g>
    <rect x="70" y="150" width="34" height="60" rx="6" fill="#9BD45A"/>
    <rect x="116" y="120" width="34" height="90" rx="6" fill="#5DAE3A"/>
    <rect x="162" y="92" width="34" height="118" rx="6" fill="url(#ct-blue)"/>
  </g>
  <!-- trend line -->
  <polyline points="70,140 120,118 165,90 210,70" fill="none" stroke="#2E9BD6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="210" cy="70" r="6" fill="#2E9BD6"/>
  <!-- calculator -->
  <g transform="translate(232,96)">
    <rect width="96" height="118" rx="12" fill="#fff" stroke="#cfe3ee" stroke-width="2"/>
    <rect x="12" y="12" width="72" height="24" rx="5" fill="#1d2733"/>
    <rect x="12" y="14" width="50" height="20" rx="3" fill="#5DAE3A" opacity=".25"/>
    <g fill="#2E9BD6">
      <rect x="12" y="48" width="20" height="16" rx="4"/>
      <rect x="38" y="48" width="20" height="16" rx="4"/>
      <rect x="64" y="48" width="20" height="16" rx="4"/>
      <rect x="12" y="70" width="20" height="16" rx="4"/>
      <rect x="38" y="70" width="20" height="16" rx="4"/>
      <rect x="64" y="70" width="20" height="16" rx="4"/>
      <rect x="12" y="92" width="46" height="16" rx="4"/>
      <rect x="64" y="92" width="20" height="16" rx="4" fill="#5DAE3A"/>
    </g>
  </g>
  <!-- coins -->
  <g transform="translate(70,214)">
    <ellipse cx="20" cy="8" rx="20" ry="8" fill="#9BD45A"/>
    <ellipse cx="20" cy="3" rx="20" ry="8" fill="#5DAE3A"/>
  </g>
</svg>
