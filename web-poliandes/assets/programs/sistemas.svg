<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Sistemas y Hardware">
  <defs>
    <linearGradient id="sy-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eafaef"/><stop offset="1" stop-color="#e0f4e4"/>
    </linearGradient>
    <linearGradient id="sy-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9BD45A"/><stop offset="1" stop-color="#5DAE3A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#sy-bg)"/>
  <!-- monitor -->
  <g transform="translate(96,54)">
    <rect width="170" height="116" rx="12" fill="#1d2733"/>
    <rect x="10" y="10" width="150" height="96" rx="6" fill="#0d1b26"/>
    <!-- code lines -->
    <g stroke-linecap="round" stroke-width="5">
      <line x1="24" y1="30" x2="64" y2="30" stroke="#5BC8E8"/>
      <line x1="72" y1="30" x2="120" y2="30" stroke="#9BD45A"/>
      <line x1="24" y1="48" x2="50" y2="48" stroke="#5DAE3A"/>
      <line x1="58" y1="48" x2="140" y2="48" stroke="#3a5a6b"/>
      <line x1="40" y1="66" x2="96" y2="66" stroke="#2E9BD6"/>
      <line x1="24" y1="84" x2="70" y2="84" stroke="#9BD45A"/>
    </g>
    <rect x="62" y="116" width="46" height="16" fill="#1d2733"/>
    <rect x="38" y="132" width="94" height="10" rx="5" fill="#1d2733"/>
  </g>
  <!-- gear / hardware chip -->
  <g transform="translate(258,150)">
    <circle cx="40" cy="40" r="38" fill="url(#sy-green)"/>
    <circle cx="40" cy="40" r="16" fill="#eafaef"/>
    <g fill="#fff">
      <rect x="36" y="-2" width="8" height="14" rx="2"/>
      <rect x="36" y="68" width="8" height="14" rx="2"/>
      <rect x="-2" y="36" width="14" height="8" rx="2"/>
      <rect x="68" y="36" width="14" height="8" rx="2"/>
    </g>
  </g>
  <!-- circuit dots -->
  <g fill="#2E9BD6">
    <circle cx="56" cy="60" r="5"/><circle cx="56" cy="110" r="5"/>
    <line x1="56" y1="60" x2="56" y2="110" stroke="#2E9BD6" stroke-width="3"/>
  </g>
</svg>
